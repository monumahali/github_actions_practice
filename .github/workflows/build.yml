name: reusable python build

on:
  # push:
  #   branches: [ "main" ]
  # workflow_dispatch:
  workflow_call:

env: 
  APP_NAME: "Python"
  # API_KEY: ${{ secrets.API_KEY }}


jobs:

  build:
    
    runs-on: ubuntu-latest

    # needs: test
  
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build tool
      run: pip install build

    - name: Build package
      run: python -m build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/